<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Corner Todo</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="panel" class="panel">

    <!-- ===== 列表视图 ===== -->
    <div class="view list-view" id="listView">

      <header class="header">
        <div class="header-left">
          <div class="header-icon" data-icon="inbox" data-icon-size="20" data-icon-color="#595959"></div>
          <h1 class="header-title" id="headerTitle">收集箱</h1>
          <span class="header-count" id="headerCount">0</span>
        </div>
        <div class="header-right">
          <button class="icon-btn" id="btnSort" title="排序"><span data-icon="sort" data-icon-size="18"></span></button>
          <button class="icon-btn" id="btnSettings" title="设置"><span data-icon="settings" data-icon-size="18"></span></button>
          <button class="icon-btn" id="btnClose" title="关闭"><span data-icon="close" data-icon-size="18"></span></button>
        </div>
      </header>

      <!-- 标签筛选条 -->
      <div class="tag-filter-bar hidden" id="tagFilterBar">
        <div class="tag-filter-scroll" id="tagFilterScroll"></div>
      </div>

      <!-- 排序菜单 -->
      <div class="sort-menu hidden" id="sortMenu">
        <div class="sort-option active" data-sort="custom">
          <span data-icon="sort" data-icon-size="15"></span><span>自定义排序</span>
          <span class="sort-check" data-icon="check-circle" data-icon-size="13"></span>
        </div>
        <div class="sort-option" data-sort="priority">
          <span data-icon="flag" data-icon-size="15"></span><span>按优先级</span>
          <span class="sort-check" data-icon="check-circle" data-icon-size="13"></span>
        </div>
        <div class="sort-option" data-sort="dueDate">
          <span data-icon="calendar" data-icon-size="15"></span><span>按日期</span>
          <span class="sort-check" data-icon="check-circle" data-icon-size="13"></span>
        </div>
        <div class="sort-option" data-sort="title">
          <span data-icon="document" data-icon-size="15"></span><span>按标题</span>
          <span class="sort-check" data-icon="check-circle" data-icon-size="13"></span>
        </div>
        <div class="sort-option" data-sort="created">
          <span data-icon="clipboard" data-icon-size="15"></span><span>按创建时间</span>
          <span class="sort-check" data-icon="check-circle" data-icon-size="13"></span>
        </div>
      </div>

      <!-- 添加任务区域 -->
      <div class="add-task-area" id="addTaskArea">
        <div class="add-task-row" id="addTaskRow">
          <button class="add-task-btn" id="addTaskBtn">
            <span data-icon="add-circle" data-icon-size="15"></span>
            <span>添加任务</span>
          </button>
        </div>
        <div class="add-task-input-area hidden" id="addTaskInputArea">
          <div class="add-task-input-wrap">
            <input type="text" id="taskInput" class="task-input" placeholder="输入任务标题，#添加标签" autocomplete="off" spellcheck="false">
          </div>
          <div class="add-task-tags hidden" id="addTaskTags"></div>
          <div class="add-task-toolbar">
            <div class="toolbar-left">
              <button class="toolbar-btn" id="btnAddDate" title="截止日期"><span data-icon="calendar" data-icon-size="16"></span></button>
              <button class="toolbar-btn" id="btnAddPriority" title="优先级"><span data-icon="flag" data-icon-size="16"></span></button>
              <button class="toolbar-btn" id="btnAddTag" title="标签"><span data-icon="tag" data-icon-size="16"></span></button>
            </div>
            <div class="toolbar-right">
              <button class="toolbar-action-btn" id="btnCancelAdd">取消</button>
              <button class="toolbar-action-btn primary" id="btnConfirmAdd">添加</button>
            </div>
          </div>
          <!-- 日期快捷选择 -->
          <div class="date-picker hidden" id="addDatePicker">
            <div class="date-option" data-date="today">
              <span data-icon="clipboard" data-icon-size="15" data-icon-color="#595959"></span><span>今天</span>
            </div>
            <div class="date-option" data-date="tomorrow">
              <span data-icon="calendar" data-icon-size="15" data-icon-color="#FF9A14"></span><span>明天</span>
            </div>
            <div class="date-option" data-date="nextWeek">
              <span data-icon="calendar" data-icon-size="15" data-icon-color="#4B7BEC"></span><span>下周</span>
            </div>
            <div class="date-divider"></div>
            <div class="date-option" data-date="custom">
              <span data-icon="calendar" data-icon-size="15"></span><span>选择日期</span>
              <input type="date" id="customDateInput" class="custom-date-input">
            </div>
            <div class="date-divider"></div>
            <div class="date-option clear-date" data-date="clear">
              <span data-icon="close" data-icon-size="15"></span><span>清除日期</span>
            </div>
          </div>
          <!-- 优先级选择 -->
          <div class="priority-picker hidden" id="addPriorityPicker">
            <div class="priority-option" data-priority="high"><span data-icon="flag" data-icon-size="16" data-icon-color="#EB4D3D"></span><span>高优先级</span></div>
            <div class="priority-option" data-priority="medium"><span data-icon="flag" data-icon-size="16" data-icon-color="#FF9A14"></span><span>中优先级</span></div>
            <div class="priority-option" data-priority="low"><span data-icon="flag" data-icon-size="16" data-icon-color="#4B7BEC"></span><span>低优先级</span></div>
            <div class="priority-divider"></div>
            <div class="priority-option" data-priority="none"><span data-icon="flag" data-icon-size="16" data-icon-color="#B8B8B8"></span><span>无优先级</span></div>
          </div>
          <!-- 标签选择 -->
          <div class="tag-picker hidden" id="addTagPicker">
            <div class="tag-picker-input-wrap">
              <input type="text" id="tagPickerInput" class="tag-picker-input" placeholder="输入标签名，回车添加" autocomplete="off" spellcheck="false">
            </div>
            <div class="tag-picker-list" id="tagPickerList"></div>
          </div>
        </div>
      </div>

      <!-- 任务列表 -->
      <div class="task-list-container" id="taskListContainer">
        <div class="task-section" id="activeSection">
          <div class="task-list" id="activeList"></div>
        </div>
        <div class="task-section completed-section hidden" id="completedSection">
          <div class="section-header" id="completedHeader">
            <span class="section-arrow" data-icon="arrow-right" data-icon-size="13"></span>
            <span class="section-title">已完成</span>
            <span class="section-count" id="completedCount">0</span>
            <button class="section-clear-btn" id="btnClearCompleted" title="全部清除"><span data-icon="trash" data-icon-size="13"></span></button>
          </div>
          <div class="task-list" id="completedList"></div>
        </div>
        <div class="empty-state" id="emptyState">
          <span data-icon="check-circle" data-icon-size="60" data-icon-color="rgba(25,25,25,0.12)"></span>
          <p class="empty-title">暂无任务</p>
          <p class="empty-desc">点击「添加任务」开始规划</p>
        </div>
      </div>

      <!-- 快捷粘贴区 -->
      <div class="snippets-section collapsed" id="snippetsSection">
        <div class="snippets-header" id="snippetsHeader">
          <span class="snippets-arrow" data-icon="arrow-right" data-icon-size="12"></span>
          <span data-icon="clipboard" data-icon-size="15"></span>
          <span class="snippets-title">快捷粘贴</span>
          <span class="snippets-count" id="snippetsCount"></span>
          <button class="snippets-add-btn" id="btnAddSnippet" title="添加"><span data-icon="add-circle" data-icon-size="14"></span></button>
        </div>
        <div class="snippets-body" id="snippetsBody">
          <div class="snippets-list" id="snippetsList"></div>
          <div class="snippet-add-form hidden" id="snippetAddForm">
            <input type="text" id="snippetValueInput" class="snippet-input" placeholder="粘贴或输入内容，回车保存" autocomplete="off" spellcheck="false">
            <div class="snippet-form-toolbar">
              <div class="snippet-form-actions">
                <button class="toolbar-action-btn" id="btnCancelSnippet">取消</button>
                <button class="toolbar-action-btn primary" id="btnConfirmSnippet">保存</button>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Toast 提示 -->
      <div class="toast hidden" id="toast">已复制</div>

      <!-- 作品署名戳 -->
      <div class="attribution" id="attribution" title="打开 GitHub 仓库">
        <div class="attribution-mark">
          <span data-icon="inbox" data-icon-size="14"></span>
        </div>
        <div class="attribution-text">
          <div class="attribution-row1">
            <span class="attribution-name">Nook</span>
            <span class="attribution-dot">·</span>
            <span class="attribution-handle">@melliefan</span>
          </div>
        </div>
        <div class="attribution-right">
          <span class="attribution-version" id="attributionVersion">v0.1.0</span>
        </div>
      </div>

      <!-- 设置弹层 -->
      <div class="settings-popover hidden" id="settingsPopover">
        <div class="settings-section">
          <div class="settings-label">热角触发位置</div>
          <div class="settings-corner-grid">
            <button class="corner-btn" data-corner="top-left">
              <span class="corner-diagram tl"></span><span>左上</span>
            </button>
            <button class="corner-btn" data-corner="top-right">
              <span class="corner-diagram tr"></span><span>右上</span>
            </button>
            <button class="corner-btn" data-corner="bottom-left">
              <span class="corner-diagram bl"></span><span>左下</span>
            </button>
            <button class="corner-btn" data-corner="bottom-right">
              <span class="corner-diagram br"></span><span>右下</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- ===== 详情视图 ===== -->
    <div class="view detail-view hidden" id="detailView">
      <header class="detail-header">
        <button class="icon-btn" id="btnBack" title="返回"><span data-icon="arrow-left" data-icon-size="18"></span></button>
        <span class="detail-list-name">收集箱</span>
        <div class="detail-header-right">
          <button class="icon-btn" id="btnDetailMore" title="更多"><span data-icon="more" data-icon-size="18"></span></button>
        </div>
      </header>

      <div class="detail-body" id="detailBody">
        <div class="detail-title-row">
          <div class="task-checkbox detail-checkbox" id="detailCheckbox">
            <svg class="check-icon" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="#FFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 12l5.5 5.5L20 7"/>
            </svg>
          </div>
          <textarea id="detailTitle" class="detail-title" rows="1" placeholder="任务标题"></textarea>
        </div>

        <div class="detail-section">
          <div class="detail-section-icon"><span data-icon="document" data-icon-size="16"></span></div>
          <textarea id="detailDesc" class="detail-desc" placeholder="添加描述..." rows="1"></textarea>
        </div>

        <div class="detail-section subtask-section">
          <div class="detail-section-header">
            <span data-icon="checklist" data-icon-size="16"></span>
            <span>检查事项</span>
            <span class="subtask-progress" id="subtaskProgress"></span>
          </div>
          <div class="subtask-list" id="subtaskList"></div>
          <div class="subtask-add-row">
            <span data-icon="add-circle" data-icon-size="15" data-icon-color="#595959"></span>
            <input type="text" id="subtaskInput" class="subtask-input" placeholder="添加子任务" autocomplete="off" spellcheck="false">
          </div>
        </div>

        <div class="detail-props">
          <div class="detail-prop-row" id="detailDateRow">
            <div class="prop-icon"><span data-icon="calendar" data-icon-size="16"></span></div>
            <span class="prop-label" id="detailDateLabel">截止日期</span>
            <button class="prop-clear hidden" id="detailDateClear" title="清除日期"><span data-icon="close" data-icon-size="12"></span></button>
            <div class="detail-date-picker hidden" id="detailDatePicker">
              <div class="date-option" data-date="today"><span>今天</span></div>
              <div class="date-option" data-date="tomorrow"><span>明天</span></div>
              <div class="date-option" data-date="nextWeek"><span>下周</span></div>
              <div class="date-divider"></div>
              <div class="date-option" data-date="custom"><span>选择日期</span><input type="date" id="detailCustomDate" class="custom-date-input"></div>
              <div class="date-divider"></div>
              <div class="date-option clear-date" data-date="clear"><span>清除日期</span></div>
            </div>
          </div>

          <div class="detail-prop-row" id="detailPriorityRow">
            <div class="prop-icon" id="detailPriorityIcon"><span data-icon="flag" data-icon-size="16"></span></div>
            <span class="prop-label" id="detailPriorityLabel">优先级</span>
            <div class="detail-priority-picker hidden" id="detailPriorityPicker">
              <div class="priority-option" data-priority="high"><span data-icon="flag" data-icon-size="16" data-icon-color="#EB4D3D"></span><span>高</span></div>
              <div class="priority-option" data-priority="medium"><span data-icon="flag" data-icon-size="16" data-icon-color="#FF9A14"></span><span>中</span></div>
              <div class="priority-option" data-priority="low"><span data-icon="flag" data-icon-size="16" data-icon-color="#4B7BEC"></span><span>低</span></div>
              <div class="priority-divider"></div>
              <div class="priority-option" data-priority="none"><span data-icon="flag" data-icon-size="16" data-icon-color="#B8B8B8"></span><span>无</span></div>
            </div>
          </div>

          <div class="detail-prop-row detail-tags-row" id="detailTagsRow">
            <div class="prop-icon"><span data-icon="tag" data-icon-size="16"></span></div>
            <div class="detail-tags-content">
              <div class="detail-tags-list" id="detailTagsList"></div>
              <input type="text" id="detailTagInput" class="detail-tag-input" placeholder="添加标签" autocomplete="off" spellcheck="false">
            </div>
          </div>
        </div>

        <div class="detail-footer-info">
          <span id="detailCreatedAt"></span>
          <span class="detail-data-path" id="detailDataPath"></span>
        </div>
      </div>

      <footer class="detail-footer">
        <button class="detail-footer-btn danger" id="btnDetailDelete">
          <span data-icon="trash" data-icon-size="15"></span><span>删除</span>
        </button>
      </footer>
    </div>

    <!-- 右键菜单 -->
    <div class="context-menu hidden" id="contextMenu">
      <div class="context-item" data-action="edit">
        <span data-icon="pen" data-icon-size="15"></span><span>查看详情</span>
      </div>
      <div class="context-submenu" data-action="priority">
        <span data-icon="flag" data-icon-size="15"></span><span>优先级</span>
        <span class="arrow-right" data-icon="arrow-right" data-icon-size="11"></span>
      </div>
      <div class="context-divider"></div>
      <div class="context-item danger" data-action="delete">
        <span data-icon="trash" data-icon-size="15"></span><span>删除</span>
      </div>
    </div>
    <div class="context-menu priority-submenu hidden" id="prioritySubmenu">
      <div class="context-item" data-priority="high"><span data-icon="flag" data-icon-size="15" data-icon-color="#EB4D3D"></span><span>高</span></div>
      <div class="context-item" data-priority="medium"><span data-icon="flag" data-icon-size="15" data-icon-color="#FF9A14"></span><span>中</span></div>
      <div class="context-item" data-priority="low"><span data-icon="flag" data-icon-size="15" data-icon-color="#4B7BEC"></span><span>低</span></div>
      <div class="context-divider"></div>
      <div class="context-item" data-priority="none"><span data-icon="flag" data-icon-size="15" data-icon-color="#B8B8B8"></span><span>无</span></div>
    </div>

    <!-- 标签颜色选择器 -->
    <div class="color-picker-popover hidden" id="colorPickerPopover">
      <div class="color-picker-grid" id="colorPickerGrid"></div>
    </div>

  </div>

  <script src="icons.js"></script>
  <script>
    // Replace all data-icon placeholders with real SVGs on load.
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('[data-icon]').forEach(el => {
        const name = el.dataset.icon;
        const size = parseInt(el.dataset.iconSize || '16');
        const color = el.dataset.iconColor || '';
        el.innerHTML = Icons.icon(name, size, '', color);
      });
    });
  </script>
  <script src="app.js"></script>
</body>
</html>

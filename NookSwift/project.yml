name: Nook
options:
  bundleIdPrefix: com.melliefan
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.3"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  Nook:
    type: application
    platform: macOS
    sources:
      - path: Nook
        excludes:
          - "Resources/Assets.xcassets/AppIcon.appiconset/*.png"
    resources:
      - path: Nook/Resources/Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.melliefan.nook
        PRODUCT_NAME: Nook
        INFOPLIST_FILE: Nook/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Nook/Resources/Nook.entitlements
        CODE_SIGN_IDENTITY: "-"
        CODE_SIGNING_REQUIRED: "NO"
        ENABLE_HARDENED_RUNTIME: "NO"
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
    entitlements:
      path: Nook/Resources/Nook.entitlements
